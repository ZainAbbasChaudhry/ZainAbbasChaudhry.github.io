<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>EasyLife Login</title>
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="EasyLife" />
  <link rel="apple-touch-icon" href="/easylife/apple-touch-icon.png" />
  <link rel="manifest" href="/easylife/manifest.webmanifest" />
  <style>
    :root{
      --bg:#000;
      --card:#161616;
      --field:#050505;
      --border:rgba(255,255,255,.12);
      --text:#fff;
      --muted:#9ca3af;
      --blue:#4da8ff;
      --purple:#8b46c5;
      --green:#25D366;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    body{padding:32px 18px 40px}
    .page{max-width:980px;margin:0 auto}
    .hero{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:18px;margin-bottom:28px}
    .hero img{width:96px;height:96px;border-radius:24px;display:block}
    .hero h1{margin:0;font-size:clamp(40px,6vw,72px);font-weight:800;letter-spacing:.4px}
    .hero p{margin:0;color:var(--muted);font-size:clamp(14px,2vw,22px)}
    .stripe{width:min(220px,60vw);height:5px;border-radius:999px;overflow:hidden;display:grid;grid-template-columns:repeat(4,1fr);margin-top:10px}
    .stripe span:nth-child(1){background:#52c7ea}
    .stripe span:nth-child(2){background:#7c1bd0}
    .stripe span:nth-child(3){background:#ec3a93}
    .stripe span:nth-child(4){background:#f38a22}
    .card{
      width:100%;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:28px;
      padding:28px;
      box-shadow:0 8px 40px rgba(0,0,0,.35);
    }
    .title{font-size:clamp(28px,4vw,48px);font-weight:800;margin:0 0 8px}
    .sub{font-size:clamp(15px,2vw,22px);color:var(--muted);margin:0 0 20px}
    .field{display:flex;align-items:center;background:var(--field);border:1px solid var(--border);border-radius:16px;height:62px;padding:0 18px;margin-bottom:18px}
    .field input{flex:1;background:transparent;border:0;outline:none;color:var(--text);font-size:22px}
    .field input::placeholder{color:#7b7b7b}
    .helper{display:flex;justify-content:flex-end;margin-top:-6px;margin-bottom:14px}
    .helper a{color:var(--blue);text-decoration:none;font-size:15px}
    .btn{
      width:100%;
      border:0;
      border-radius:18px;
      height:70px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      font-weight:800;
      cursor:pointer;
      color:#fff;
      text-decoration:none;
      margin-top:14px;
    }
    .btn-primary{background:linear-gradient(90deg,#4da8ff,#8b46c5)}
    .btn-secondary{background:linear-gradient(90deg,#30363f,#171d24)}
    .btn-whatsapp{
      background:transparent;
      border:1px solid rgba(37,211,102,.28);
      color:var(--green);
      font-size:20px;
      height:62px;
    }
    .signup{text-align:center;margin-top:18px;color:var(--muted);font-size:17px}
    .signup a{color:var(--blue);text-decoration:none;font-weight:700}
    .footer{text-align:center;color:rgba(255,255,255,.35);font-size:14px;margin-top:16px}
    .status{min-height:24px;text-align:center;color:#9dd1ff;font-size:14px;margin-top:12px}
    .fallback{text-align:center;margin-top:8px}
    .fallback a{color:rgba(255,255,255,.6);font-size:13px}
    iframe{display:none}
    @media (max-width:640px){
      body{padding:22px 14px 32px}
      .hero img{width:78px;height:78px}
      .card{padding:20px}
      .field{height:56px}
      .field input{font-size:18px}
      .btn{height:58px;font-size:22px}
      .btn-whatsapp{font-size:17px}
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <img src="/easylife/apple-touch-icon.png" alt="EasyLife logo" />
      <h1>EasyLife</h1>
      <p>Proud Pakistani Company</p>
      <div class="stripe"><span></span><span></span><span></span><span></span></div>
    </section>

    <section class="card">
      <h2 class="title">Welcome Back</h2>
      <p class="sub">Sign in with your member ID</p>

      <div class="field">
        <input id="memberId" type="text" placeholder="Member ID" autocomplete="username" />
      </div>

      <div class="field">
        <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
      </div>

      <div class="helper">
        <a id="forgotLink" href="#">Forgot Password / ID?</a>
      </div>

      <button class="btn btn-primary" id="signInBtn" type="button">Sign In</button>
      <button class="btn btn-secondary" id="guestBtn" type="button">Continue as Guest</button>
      <a class="btn btn-whatsapp" id="whatsAppBtn" href="https://wa.me/923446242066?text=Assalam-o-Alaikum%20EasyLife%20Support%2C%20mujhe%20login%20help%20chahiye." target="_blank" rel="noopener noreferrer">Official WhatsApp Support</a>

      <div class="signup">
        Don't have an account? <a href="/easylife/register.html">Sign Up</a>
      </div>
      <div class="status" id="statusText"></div>
      <div class="fallback">
        <a href="/easylife/app-login.html">Open Full App Login</a>
      </div>
    </section>

    <div class="footer">Easylife (SMC-Pvt Ltd)</div>
  </div>

  <iframe id="appLoginFrame" src="/easylife/app-login.html" aria-hidden="true"></iframe>

  <script>
    const statusText = document.getElementById('statusText');
    const memberIdInput = document.getElementById('memberId');
    const passwordInput = document.getElementById('password');

    function setStatus(message) {
      statusText.textContent = message || '';
    }

    function launchFullApp(payload) {
      sessionStorage.setItem('easylife-login-forward', JSON.stringify(payload));
      location.href = '/easylife/app-login.html';
    }

    document.getElementById('signInBtn').addEventListener('click', () => {
      const memberId = memberIdInput.value.trim();
      const password = passwordInput.value.trim();
      if (!memberId || !password) {
        setStatus('Member ID aur password dono likho.');
        return;
      }
      setStatus('Login khol raha hoon...');
      launchFullApp({ type: 'signin', memberId, password, ts: Date.now() });
    });

    document.getElementById('guestBtn').addEventListener('click', () => {
      setStatus('Guest mode khol raha hoon...');
      launchFullApp({ type: 'guest', ts: Date.now() });
    });

    document.getElementById('forgotLink').addEventListener('click', (event) => {
      event.preventDefault();
      const memberId = memberIdInput.value.trim();
      const msg = encodeURIComponent(`Assalam-o-Alaikum EasyLife Support, mujhe account recovery chahiye. Member ID: ${memberId || 'N/A'}`);
      window.open(`https://wa.me/923446242066?text=${msg}`, '_blank', 'noopener');
    });
  </script>
</body>
</html>
